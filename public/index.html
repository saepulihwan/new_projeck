<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir Modern</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @media print {

      body * {
        visibility: hidden;
      }

      #struk,
      #struk * {
        visibility: visible;
      }

      #struk {
        position: absolute;
        left: 0;
        top: 0;
        width: 300px;
      }
    }
  </style>

</head>

<body class="bg-slate-900 text-white p-3 md:p-6">

<h1 class="text-3xl font-bold mb-6 text-center">
  🛒 Kasir Modern
</h1>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

  <!-- INPUT -->
  <div class="bg-slate-800 p-6 rounded-2xl shadow-lg">

    <h2 class="text-2xl mb-5 font-semibold">
      Input Barang
    </h2>

    <div class="space-y-4">

      <!-- NAMA -->
      <input
        id="nama"
        placeholder="Nama barang"
        class="w-full p-4 rounded-lg text-black text-lg">

      <!-- HARGA -->
      <input
        id="harga"
        type="number"
        placeholder="Harga"
        class="w-full p-4 rounded-lg text-black text-lg">

      <!-- JUMLAH -->
      <input
        id="jumlah"
        type="number"
        placeholder="Jumlah"
        class="w-full p-4 rounded-lg text-black text-lg">

      <!-- TAMBAH -->
      <button
        onclick="tambah()"
        class="bg-blue-500 hover:bg-blue-600 p-4 rounded-lg w-full text-lg font-bold">

        + Tambah Barang

      </button>

      <!-- RESET -->
      <button
        onclick="resetKasir()"
        class="bg-red-500 hover:bg-red-600 p-4 rounded-lg w-full text-lg font-bold">

        Reset

      </button>

      <!-- RIWAYAT -->
      <a href="/riwayat.html"
        class="block bg-purple-500 hover:bg-purple-600 p-4 rounded-lg text-center text-lg font-bold">

        📊 Riwayat Transaksi

      </a>

    </div>

  </div>


  <!-- LIST -->
  <div class="bg-slate-800 p-6 rounded-2xl shadow-lg">

    <h2 class="text-2xl mb-5 font-semibold">
      🧾 Daftar Belanja
    </h2>

    <ul id="list" class="space-y-3"></ul>

    <div class="mt-6">

      <h2 class="text-2xl md:text-3xl">
        Total:
        <span class="text-green-400 font-bold">
          Rp <span id="total">0</span>
        </span>
      </h2>

      <!-- INPUT BAYAR -->
      <input
        id="bayar"
        type="number"
        placeholder="Uang Bayar"
        class="w-full p-4 rounded-lg text-black text-lg mt-4">

      <!-- BUTTON BAYAR -->
      <button
        onclick="bayarTransaksi()"
        class="bg-green-500 hover:bg-green-600 p-4 rounded-lg w-full mt-3 text-lg font-bold">

        💰 Bayar

      </button>

      <!-- KEMBALIAN -->
      <h3 class="mt-5 text-xl">
        Kembalian:
        <span class="text-yellow-400 font-bold">
          Rp <span id="kembalian">0</span>
        </span>
      </h3>

    </div>

  </div>

</div>


<!-- STRUK -->
<div id="struk"
  class="hidden bg-white text-black p-4 mt-6 rounded w-full max-w-sm mx-auto shadow-lg">

  <h2 class="text-center font-bold text-2xl">
    TOKO KASIR
  </h2>

  <p class="text-center text-sm mb-4">
    Jl. Contoh No.123
  </p>

  <hr class="mb-2">

  <div id="isi-struk"></div>

  <hr class="my-2">

  <p class="text-lg">
    Total: Rp <span id="struk-total"></span>
  </p>

  <p class="text-lg">
    Bayar: Rp <span id="struk-bayar"></span>
  </p>

  <p class="text-lg">
    Kembalian: Rp <span id="struk-kembalian"></span>
  </p>

  <p class="text-center mt-4 text-sm">
    Terima kasih 🙏
  </p>

  <button
    onclick="window.print()"
    class="bg-green-500 text-white px-4 py-3 rounded-lg w-full mt-4 text-lg font-bold">

    🖨️ Cetak Struk

  </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>

</body>
</html>
